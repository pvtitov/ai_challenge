# MCP Server Configuration
# URL of the MCP server to connect to
# Change this to your actual MCP server URL
mcp.server.url=http://localhost:8081
mcp.knowledge.server.url=http://localhost:8082
mcp.github.server.url=http://localhost:8083

# Embedding Search Configuration
# Path to the embeddings database (created by embedding-tool)
embedding.db.path=embeddings.db
embedding.queryRewrite.enabled=false
embedding.topKBeforeRerank=20
embedding.topKAfterRerank=5
embedding.similarityThreshold=0.6
